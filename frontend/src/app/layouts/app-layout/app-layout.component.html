<nav class="navbar">

  <div class="navbar-left">
    <div class="navbar-brand">
      <span class="navbar-logo">🍲</span>
      <span class="navbar-title">JustCook</span>
    </div>

    <div class="navbar-links">
      <a routerLink="/app/recipes" routerLinkActive="active">
        <mat-icon>restaurant</mat-icon>
        Recipes
      </a>
      <a routerLink="/app/tags" routerLinkActive="active">
        <mat-icon>local_offer</mat-icon>
        Tags
      </a>
      <a routerLink="/app/planner" routerLinkActive="active">
        <mat-icon>assignment</mat-icon>
        Plan
      </a>
      <a routerLink="/app/shop" routerLinkActive="active">
        <mat-icon>shopping_cart</mat-icon>
        Shop
      </a>
    </div>
  </div>

  <div class="navbar-actions">
    @if (currentUser(); as user) {
      <button mat-button class="user-menu-btn" [matMenuTriggerFor]="userMenu">
        @if (user.pictureUrl) {
          <img [src]="user.pictureUrl" [alt]="user.firstName ?? 'User'" class="nav-avatar" />
        } @else {
          <mat-icon>account_circle</mat-icon>
        }
        <span class="nav-greeting">Hi, {{ user.firstName }}!</span>
        <mat-icon class="chevron">expand_more</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <a mat-menu-item routerLink="/app/account">
          <mat-icon>manage_accounts</mat-icon>
          Account
        </a>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          Sign out
        </button>
      </mat-menu>
    }
  </div>

</nav>

<main class="main-content">
  <router-outlet />
</main>
