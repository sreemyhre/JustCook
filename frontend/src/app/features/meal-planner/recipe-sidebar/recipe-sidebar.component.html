<div class="sidebar">

  <p class="panel-title">Recipes</p>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search</mat-label>
    <input matInput
           [value]="searchText()"
           (input)="searchText.set($any($event.target).value)"
           placeholder="Type to search..." />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="recipe-list"
       cdkDropList
       [cdkDropListData]="filteredRecipes"
       [cdkDropListEnterPredicate]="noReturn">
    @for (recipe of filteredRecipes; track recipe.id) {
      <div class="recipe-drag-item"
           cdkDrag
           [cdkDragData]="recipe"
           [cdkDragDisabled]="!editMode">
        <span class="recipe-name">{{ recipe.name }}</span>
        <span class="recipe-date">{{ formatLastCooked(recipe.lastCookedDate) }}</span>
        <div *cdkDragPreview class="drag-preview">{{ recipe.name }}</div>
      </div>
    }
  </div>

</div>
