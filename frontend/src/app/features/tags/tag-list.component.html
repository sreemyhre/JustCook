<div class="page-container">
  <h1 class="page-title">Tags</h1>

  <div class="card table-card">
    <table mat-table [dataSource]="tags()" class="tags-table">

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let tag">
          @if (editingId() === tag.id) {
            <mat-form-field appearance="outline" class="inline-edit-field">
              <input matInput
                     [ngModel]="editingName()"
                     (ngModelChange)="editingName.set($event)"
                     (keyup.enter)="saveEdit(tag)"
                     (keyup.escape)="cancelEdit()" />
            </mat-form-field>
          } @else {
            {{ tag.name }}
          }
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-header">Actions</th>
        <td mat-cell *matCellDef="let tag" class="actions-cell">
          @if (editingId() === tag.id) {
            <button mat-icon-button color="primary" (click)="saveEdit(tag)" title="Save">
              <mat-icon>check</mat-icon>
            </button>
            <button mat-icon-button (click)="cancelEdit()" title="Cancel">
              <mat-icon>close</mat-icon>
            </button>
          } @else if (deletingId() === tag.id) {
            <span class="delete-confirm-label"> Confirm Delete?</span>
            <button mat-icon-button color="warn" (click)="deleteTag(tag)" title="Confirm delete">
              <mat-icon>check</mat-icon>
            </button>
            <button mat-icon-button (click)="cancelDelete()" title="Cancel">
              <mat-icon>close</mat-icon>
            </button>
          } @else {
            <button mat-icon-button (click)="startEdit(tag)" title="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="confirmDelete(tag)" title="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    @if (tags().length === 0) {
      <p class="empty-msg">No tags yet. Add one below.</p>
    }

    <!-- New Tag Row -->
    <div class="new-tag-row">
      <mat-form-field appearance="outline" class="new-tag-field">
        <mat-label>New tag name</mat-label>
        <input matInput
               [ngModel]="newTagName()"
               (ngModelChange)="newTagName.set($event); addTagError.set('')"
               (keyup.enter)="addTag()"
               placeholder="e.g. Vegetarian" />
      </mat-form-field>
      <button mat-raised-button class="btn-accent" (click)="addTag()">
        <mat-icon>add</mat-icon> Add Tag
      </button>
      @if (addTagError()) {
        <span class="add-tag-error">{{ addTagError() }}</span>
      }
    </div>
  </div>
</div>
