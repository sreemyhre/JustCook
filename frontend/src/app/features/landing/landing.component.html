<!-- Features -->
<section class="features">
  <h2 class="features-title">Preview the app before you login</h2>
  <div class="carousel">
    <div class="carousel-card card">
      <div class="carousel-video">
        <video
          [src]="activeSlide.video"
          muted
          autoplay
          loop
          playsinline
        ></video>
      </div>
      <div class="carousel-copy">
        <span class="carousel-badge">In-app preview</span>
        <h3>{{ activeSlide.title }}</h3>
        <p>{{ activeSlide.description }}</p>
      </div>
    </div>

    <div class="carousel-dots">
      <button
        *ngFor="let slide of slides; let i = index"
        type="button"
        class="carousel-dot"
        [class.active]="i === currentIndex"
        (click)="goToSlide(i)"
        [attr.aria-label]="'Go to ' + slide.title"
      ></button>
    </div>
  </div>
</section>

<!-- Bottom CTA -->
<section class="cta-banner">
  <p class="cta-text">Ready to unlock your kitchen workflow? Login with Google to get started.</p>
  <a routerLink="/login" class="btn-cta">Login with Google</a>
</section>
